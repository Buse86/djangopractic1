<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ message.subject }}</title>
</head>
<body>
    <a href="{% url 'inbox' %}">← Назад к списку</a>
    <hr>
    <h1>{{ message.subject }}</h1>
    <p><strong>От:</strong> {{ message.sender.username }}</p>
    <p><strong>Кому:</strong> {{ message.recipient.username }}</p>
    <p><strong>Дата:</strong> {{ message.created_at }}</p>
    <hr>
    <div style="background: #f9f9f9; padding: 20px; border: 1px solid #ddd;">
        {{ message.body|linebreaks }}
    </div>
    <br>
    <a href="{% url 'archive_message' message.id %}">[В архив]</a>
    <a href="{% url 'move_to_trash' message.id %}" style="color: orange;">[В корзину]</a>
    <a href="{% url 'delete_permanently' message.id %}" style="color: red;" onclick="return confirm('Удалить навсегда?')">[Удалить безвозвратно]</a>
</body>
</html>
