<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        .message-item { border-bottom: 1px solid #ccc; padding: 10px 0; }
        .unread { font-weight: bold; color: #007bff; }
        .menu { margin-bottom: 20px; background: #eee; padding: 10px; }
        .menu a { margin-right: 15px; text-decoration: none; color: black; font-weight: bold; }
    </style>
</head>
<body>
    <div class="menu">
        <a href="{% url 'inbox' %}">📥 Входящие</a>
        <a href="{% url 'sent' %}">📤 Отправленные</a>
        <a href="{% url 'send_email' %}">✍️ Написать</a>
    </div>

    <h1>{{ title }}</h1>

    {% for msg in messages %}
        <div class="message-item {% if not msg.is_read %}unread{% endif %}">
            <strong>Тема: {{ msg.subject }}</strong> <br>
            <small>От: {{ msg.sender.username }} | Дата: {{ msg.created_at|date:"d.m.Y H:i" }}</small> <br>
            <a href="{% url 'detail_message' msg.id %}">Открыть</a> | 
            <a href="{% url 'move_to_trash' msg.id %}" style="color: red;">В корзину</a>
        </div>
    {% empty %}
        <p>Писем нет.</p>
    {% endfor %}
</body>
</html>
